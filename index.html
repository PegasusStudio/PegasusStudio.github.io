<!DOCTYPE html>
<html lang="en">

    <meta name="robots" content="index,follow">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Inter, "Segoe UI", Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a, #111827);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {

        }

            font-size: 3rem;

        h1 {

        }

        p {
            color: #cbd5e1;
            font-size: 1.1rem;
            line-height: 1.7;
            margin-bottom: 30px;
        }

        .tag {
            display: inline-block;
            padding: 10px 20px;
            border: 1px solid rgba(255,255,255,.15);
            border-radius: 999px;
            color: #93c5fd;
            margin-bottom: 35px;
            background: rgba(255,255,255,.05);
        }

        .contact a {
            color: #60a5fa;
            text-decoration: none;
        }

        .contact a:hover {
            text-decoration: underline;
        }

        footer {
            margin-top: 50px;
            color: #64748b;
            font-size: .9rem;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 2.2rem;
            }

            p {
                font-size: 1rem;
            }

            .logo {
                font-size: 2.5rem;
            }
        }
